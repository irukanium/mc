<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#1b1b1b">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統合要塞推定ツール（チャンク/ネザー/距離対応）</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<h1>エンド要塞探してる？</h1>
エンド要塞を楽して探したいけどChunk Finderを使うのはズルいかなって思ってる人におすすめのツールです。プレイヤーとエンダーアイの位置だけでエンド要塞の座標を計算で求めれます！
<hr>
<label>計算方法　</label>
<select id="methodSelect">
  <option value="yaw">Yawベース</option>
  <option value="xz">Eyeベース</option>
</select>

<div id="methodDescription"></div>
<br>
<div class="main">
<div class="left">
    <div id="throws"></div>
    <button onclick="addThrow()">投目を追加</button>
    <button onclick="calc()">特定する</button>
<br>
    <button onclick="resetAll()" style="background:#cc3333;">リセット</button>
</div>

<div class="right">
    <div id="result"></div>
    <button id="copyBtn" class="copyBtn" onclick="copyCoord()" style="display:none">座標をコピー</button>
    <canvas id="mapCanvas" width="400" height="400"></canvas>
</div>
</div>

<div id="notifications"></div>
</body>
</html>
